name: DevOps CI

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend
        run: |
          docker build -t athi1833/frontend:latest ./frontend

      - name: Build Backend
        run: |
          docker build -t athi1833/backend:latest ./backend

      - name: Push Frontend
        run: |
          docker push athi1833/frontend:latest

      - name: Push Backend
        run: |
          docker push athi1833/backend:latest
